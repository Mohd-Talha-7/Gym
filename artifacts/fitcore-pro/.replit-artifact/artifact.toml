kind = "web"
previewPath = "/"
title = "FitCore Pro Dashboard"
version = "1.0.0"
id = "artifacts/fitcore-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25576

[services.development]
run = "pnpm --filter @workspace/fitcore-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitcore-pro", "run", "build" ]
publicDir = "artifacts/fitcore-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25576"
BASE_PATH = "/"
