                $ref: "#/components/schemas/SportsReport"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DashboardStats:
      type: object
      required: [totalMembers, activeMembers, expiredMembers, pendingPayments, totalChange, activeChange, expiredChange, pendingChange]
      properties:
        totalMembers: { type: integer }
        activeMembers: { type: integer }
        expiredMembers: { type: integer }
        pendingPayments: { type: integer }
        totalChange: { type: integer }
        activeChange: { type: integer }
        expiredChange: { type: integer }
        pendingChange: { type: integer }

    AttendanceAnalytics:
      type: object
      required: [days]
      properties:
        days:
          type: array
          items:
            type: object
            required: [label, count, percent]
            properties:
              label: { type: string }
              count: { type: integer }
              percent: { type: integer }

    ScheduleItem:
      type: object
      required: [id, trainer, status, time, avatarUrl]
      properties:
        id: { type: string }
        trainer: { type: string }
        status: { type: string }
        time: { type: string }
        avatarUrl: { type: string }

    CollectionProgress:
      type: object
      required: [percent, collected, target]
      properties:
        percent: { type: integer }
        collected: { type: integer }
        target: { type: integer }

    RevenueSummary:
      type: object
      required: [revenue, growth, monthly]
      properties:
        revenue: { type: integer }
        growth: { type: integer }
        monthly:
          type: array
          items:
            type: object
            required: [month, value]
            properties:
              month: { type: string }
              value: { type: integer }

    Member:
      type: object
      required: [id, name, phone, status, plan, joinDate, expiryDate, gender, avatarUrl, balanceDue]
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        status: { type: string }
        plan: { type: string }
        joinDate: { type: string, format: date-time }
        expiryDate: { type: string, format: date-time }
        gender: { type: string }
        bloodGroup: { type: ["string", "null"] }
        dob: { type: ["string", "null"], format: date-time }
        address: { type: ["string", "null"] }
        avatarUrl: { type: string }
        balanceDue: { type: integer }
        medicalHistory: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }

    CreateMemberInput:
      type: object
      required: [name, phone, gender, plan]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        gender: { type: string }
        bloodGroup: { type: ["string", "null"] }
        dob: { type: ["string", "null"], format: date-time }
        address: { type: ["string", "null"] }
        plan: { type: string }
        medicalHistory: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }

    UpdateMemberInput:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        gender: { type: string }
        bloodGroup: { type: ["string", "null"] }
        dob: { type: ["string", "null"], format: date-time }
        address: { type: ["string", "null"] }
        plan: { type: string }
        status: { type: string }
        expiryDate: { type: string, format: date-time }
        medicalHistory: { type: ["string", "null"] }
        emergencyContact: { type: ["string", "null"] }

    Celebration:
      type: object
      required: [id, name, type, date, phone, avatarUrl]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        date: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }

    Inquiry:
      type: object
      required: [id, name, phone, interest, source, status, inquiryDate, assignedTo]
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        interest: { type: string }
        source: { type: string }
        status: { type: string }
        inquiryDate: { type: string, format: date-time }
        assignedTo: { type: string }
        notes: { type: ["string", "null"] }

    CreateInquiryInput:
      type: object
      required: [name, phone, interest, source]
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        interest: { type: string }
        source: { type: string }
        assignedTo: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    UpdateInquiryInput:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: ["string", "null"] }
        interest: { type: string }
        source: { type: string }
        status: { type: string }
        assignedTo: { type: string }
        notes: { type: ["string", "null"] }

    FollowUp:
      type: object
      required: [id, memberId, memberName, type, priority, scheduledFor, status, lastComment, phone]
      properties:
        id: { type: string }
        memberId: { type: ["string", "null"] }
        memberName: { type: string }
        type: { type: string }
        priority: { type: string }
        scheduledFor: { type: string, format: date-time }
        status: { type: string }
        lastComment: { type: string }
        phone: { type: string }

    CreateFollowUpInput:
      type: object
      required: [memberName, type, priority, scheduledFor, phone]
      properties:
        memberId: { type: ["string", "null"] }
        memberName: { type: string }
        type: { type: string }
        priority: { type: string }
        scheduledFor: { type: string, format: date-time }
        lastComment: { type: ["string", "null"] }
        phone: { type: string }

    UpdateFollowUpInput:
      type: object
      properties:
        type: { type: string }
        priority: { type: string }
        scheduledFor: { type: string, format: date-time }
        status: { type: string }
        lastComment: { type: string }

    Renewal:
      type: object
      required: [memberId, memberName, phone, plan, expiryDate, amountDue, daysLeft]
      properties:
        memberId: { type: string }
        memberName: { type: string }
        phone: { type: string }
        plan: { type: string }
        expiryDate: { type: string, format: date-time }
        amountDue: { type: integer }
        daysLeft: { type: integer }

    AttendanceRecord:
      type: object
      required: [id, memberId, memberName, checkIn, source]
      properties:
        id: { type: string }
        memberId: { type: string }
        memberName: { type: string }
        memberAvatar: { type: ["string", "null"] }
        checkIn: { type: string, format: date-time }
        checkOut: { type: ["string", "null"], format: date-time }
        source: { type: string }

    MarkAttendanceInput:
      type: object
      required: [memberId]
      properties:
        memberId: { type: string }
        source: { type: ["string", "null"] }

    Bill:
      type: object
      required: [id, memberId, memberName, type, amount, paid, balance, status, createdAt]
      properties:
        id: { type: string }
        memberId: { type: string }
        memberName: { type: string }
        type: { type: string }
        items:
          type: array
          items:
            type: object
            required: [name, amount]
            properties:
              name: { type: string }
              amount: { type: integer }
        amount: { type: integer }
        paid: { type: integer }
        balance: { type: integer }
        status: { type: string }
        paymentMode: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    CreateBillInput:
      type: object
      required: [memberId, type, items]
      properties:
        memberId: { type: string }
        type: { type: string }
        items:
          type: array
          items:
            type: object
            required: [name, amount]
            properties:
              name: { type: string }
              amount: { type: integer }
        paid: { type: integer }
        paymentMode: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    UpdateBillInput:
      type: object
      properties:
        paid: { type: integer }
        status: { type: string }
        paymentMode: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }

    PosProduct:
      type: object
      required: [id, name, price, category, stock]
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: integer }
        category: { type: string }
        stock: { type: integer }
        imageUrl: { type: ["string", "null"] }

